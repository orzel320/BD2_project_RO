version: '3.8'

services:
  neo4j:
    image: neo4j:5.18.0-community
    container_name: neo4j_bd2
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/projektBD2
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fastapi_bd2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=projektBD2
      - PYTHONPATH=/app/backend
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs: